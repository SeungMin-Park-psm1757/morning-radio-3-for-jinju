name: Daily Performing Arts Monitor

on:
  workflow_dispatch:
    inputs:
      hours_back:
        description: "Manual run override in hours. Leave empty to use the scheduled window logic."
        required: false
        default: "72"
  schedule:
    - cron: "0 0 * * 1-5"

concurrency:
  group: daily-performing-arts-monitor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
      PERFORMING_ARTS_MONITOR_HOURS_BACK: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.hours_back || '' }}
      PERFORMING_ARTS_MONITOR_TELEGRAM_SILENT: ${{ vars.PERFORMING_ARTS_MONITOR_TELEGRAM_SILENT }}
      PERFORMING_ARTS_MONITOR_PUBLIC_ARCHIVE_BASE_URL: ${{ vars.PERFORMING_ARTS_MONITOR_PUBLIC_ARCHIVE_BASE_URL }}
      PERFORMING_ARTS_MONITOR_SCHEDULE_HOUR_LOCAL: "9"
      PERFORMING_ARTS_MONITOR_WEEKDAYS_ONLY: "true"
      PERFORMING_ARTS_MONITOR_SCORE_THRESHOLD: "55"
      PERFORMING_ARTS_MONITOR_MAX_TOTAL_ITEMS: "8"
      PERFORMING_ARTS_MONITOR_MAX_ITEMS_PER_CATEGORY: "3"
      PERFORMING_ARTS_MONITOR_OUTPUT_DIR: output
      PERFORMING_ARTS_MONITOR_ARCHIVE_LIMIT: "20"
      PERFORMING_ARTS_MONITOR_TIMEZONE: Asia/Seoul
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Build performing arts monitor
        run: |
          performing-arts-monitor

      - name: Publish run summary
        run: |
          latest_dir="$(find output -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort | tail -n 1)"
          echo "## Digest" >> "$GITHUB_STEP_SUMMARY"
          cat "output/${latest_dir}/message_digest.md" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Run Summary" >> "$GITHUB_STEP_SUMMARY"
          cat "output/${latest_dir}/summary.md" >> "$GITHUB_STEP_SUMMARY"
        shell: bash

      - name: Upload output artifact
        uses: actions/upload-artifact@v4
        with:
          name: performing-arts-monitor-output
          path: output/
          if-no-files-found: error
